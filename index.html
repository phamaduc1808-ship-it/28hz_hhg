<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>hz_hhg_122007</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

/* nút loa */
#musicBtn{
position:fixed;
top:20px;
right:20px;
width:50px;
height:50px;
border:none;
border-radius:50%;
background:rgba(0,0,0,0.5);
cursor:pointer;
padding:6px;
z-index:10;
}

#musicBtn svg{
width:100%;
height:100%;
fill:white;
}

/* nút thư */
#letterBtn{
position:fixed;
top:80px;
right:20px;
width:60px;
height:40px;
font-size:28px;
border:none;
border-radius:8px;
background:#ffb6c1;
cursor:pointer;
z-index:10;
}

/* hộp thư */
#letterContent{
position:fixed;
top:70px;
right:90px;

width:420px;
max-width:80vw;

max-height:70vh;
overflow-y:auto;

padding:20px;

background:
repeating-linear-gradient(
white,
white 24px,
#ffd6e7 25px
);

border-radius:12px;

box-shadow:0 0 20px rgba(255,105,180,0.5);

font-family:Arial;
line-height:1.6;

display:none;

z-index:20;
}

#letterContent h3{
color:#ff4da6;
margin-top:0;
}

#letterContent button{
margin-top:15px;
padding:6px 12px;
border:none;
border-radius:6px;
background:#ff69b4;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<button id="musicBtn">
<svg viewBox="0 0 24 24" id="iconSpeaker">
<path d="M3 9v6h4l5 5V4L7 9H3z"></path>
</svg>
</button>

<button id="letterBtn">💌</button>

<div id="letterContent">

<h3>gửi hg nè</h3>

<p>
cũng lâu r nhờ, kbiet bây giờ m như nào r cũng tò mò phết, còn t chỉ có ăn với code...

web riêng cho m đấy.
</p>

<button id="closeLetter">đóng</button>

</div>


<audio id="bgMusic" loop>
<source src="camonnguoidathuccungtoi.mp3">
</audio>


<!-- THREE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>


<script>

/* scene */

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
)

let renderer=new THREE.WebGLRenderer({antialias:true})

renderer.setSize(
window.innerWidth,
window.innerHeight
)

document.body.appendChild(renderer.domElement)

let controls=new THREE.OrbitControls(
camera,
renderer.domElement
)

camera.position.z=80



/* ảnh */

let images=[]

let loader=new THREE.TextureLoader()

let urls=[

"img1.jpg",
"img2.jpg",
"img3.jpg",
"img4.jpg",
"img5.jpg"

]

for(let i=0;i<40;i++){

let texture=loader.load(
urls[i%urls.length]
)

let geo=new THREE.PlaneGeometry(22,22)

let mat=new THREE.MeshBasicMaterial({

map:texture,
transparent:true

})

let pic=new THREE.Mesh(geo,mat)

pic.position.set(

(Math.random()-0.5)*200,
Math.random()*200,
(Math.random()-0.5)*200

)

pic.speed=0.1+Math.random()*0.05

scene.add(pic)

images.push(pic)

}



/* sao */

for(let i=0;i<2000;i++){

let star=new THREE.Mesh(

new THREE.SphereGeometry(0.1),

new THREE.MeshBasicMaterial({

color:0xffffff

})

)

star.position.set(

(Math.random()-0.5)*400,
(Math.random()-0.5)*400,
(Math.random()-0.5)*400

)

scene.add(star)

}



/* animate */

function animate(){

requestAnimationFrame(animate)

images.forEach(p=>{

p.position.y-=p.speed

if(p.position.y<-120){

p.position.y=120

}

})

controls.update()

renderer.render(scene,camera)

}

animate()



/* resize */

window.addEventListener(

"resize",

()=>{

camera.aspect=

window.innerWidth/window.innerHeight

camera.updateProjectionMatrix()

renderer.setSize(

window.innerWidth,
window.innerHeight

)

}

)



/* nhạc */

let music=document.getElementById("bgMusic")

document.addEventListener(

"click",

()=>{

music.play()

},

{once:true}

)



document.getElementById(

"musicBtn"

).onclick=()=>{

if(music.paused){

music.play()

}else{

music.pause()

}

}



/* thư */

let letterBtn=document.getElementById("letterBtn")

let letter=document.getElementById("letterContent")

let closeLetter=document.getElementById("closeLetter")

letterBtn.onclick=()=>{

letter.style.display="block"

}

closeLetter.onclick=()=>{

letter.style.display="none"

}

</script>

</body>
</html>
